name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform Run
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_static_ip_id: ${{ secrets.YC_STATIC_IP_ID }}

      TF_VAR_access_key: ${{ secrets.YC_ACCESS_KEY_ID }}
      TF_VAR_secret_key: ${{ secrets.YC_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Restore YC service account key
        working-directory: ./terraform
        run: |
          echo "${{ secrets.YC_SA_KEY }}" | base64 -d > key.json

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.13.0"

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="access_key=${{ secrets.YC_ACCESS_KEY_ID }}" -backend-config="secret_key=${{ secrets.YC_SECRET_ACCESS_KEY }}"

      - name: Terraform Plan
        working-directory: ./terraform
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./terraform
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        working-directory: ./terraform
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve